<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Base - navy blue -->
  <rect width="800" height="800" fill="#1e4a6f" />
  
  <!-- Left edge blend -->
  <rect width="60" height="800" fill="#f5f5f5" opacity="1" />
  <rect x="60" width="40" height="800" fill="#1e4a6f" opacity="0.3" />
  <rect x="100" width="30" height="800" fill="#1e4a6f" opacity="0.7" />
  
  <!-- Large overlapping circles - Ethiopian colors -->
  <circle cx="550" cy="250" r="180" fill="#5cb85c" opacity="0.15" />
  <circle cx="650" cy="350" r="160" fill="#ffd700" opacity="0.12" />
  <circle cx="600" cy="480" r="170" fill="#e53935" opacity="0.13" />
  
  <!-- Clean rectangular flag element -->
  <g>
    <rect x="200" y="120" width="200" height="30" fill="#5cb85c" opacity="0.4" />
    <rect x="200" y="160" width="200" height="30" fill="#ffd700" opacity="0.35" />
    <rect x="200" y="200" width="200" height="30" fill="#e53935" opacity="0.3" />
  </g>
  
  <!-- Healthcare symbols - stethoscope inspired curves -->
  <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3">
    <circle cx="300" cy="500" r="40" />
    <path d="M 300 540 L 300 620 Q 300 650 330 650 L 370 650" />
    <circle cx="385" cy="650" r="15" fill="#ffffff" opacity="0.3" />
  </g>
  
  <!-- Network nodes -->
  <circle cx="250" cy="650" r="8" fill="#5cb85c" opacity="0.7" />
  <circle cx="450" cy="600" r="10" fill="#ffd700" opacity="0.7" />
  <circle cx="600" cy="650" r="7" fill="#e53935" opacity="0.7" />
  
  <!-- Connection lines between nodes -->
  <line x1="250" y1="650" x2="450" y2="600" stroke="#ffffff" stroke-width="1.5" opacity="0.2" />
  <line x1="450" y1="600" x2="600" y2="650" stroke="#ffffff" stroke-width="1.5" opacity="0.2" />
  
  <!-- EKG/heartbeat - sharp geometric -->
  <polyline points="180,380 240,380 265,340 290,420 315,380 410,380 435,360 460,400 485,380 600,380" stroke="#ffffff" stroke-width="3.5" fill="none" opacity="0.35" stroke-linejoin="miter" />
  
  <!-- Decorative elements -->
  <rect x="160" y="740" width="70" height="8" fill="#ffffff" opacity="0.15" rx="2" />
  <rect x="700" y="80" width="8" height="70" fill="#ffffff" opacity="0.15" rx="2" />
  
  <!-- Small squares pattern -->
  <rect x="680" y="680" width="30" height="30" fill="#5cb85c" opacity="0.2" rx="3" />
  <rect x="720" y="680" width="30" height="30" fill="#ffd700" opacity="0.2" rx="3" />
  <rect x="700" y="720" width="30" height="30" fill="#e53935" opacity="0.2" rx="3" />
</svg>
