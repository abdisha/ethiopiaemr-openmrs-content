<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" stop-opacity="1" />
      <stop offset="100%" stop-color="#e9ecef" stop-opacity="1" />
    </linearGradient>
  </defs>
  
  <!-- Clean light base -->
  <rect width="800" height="800" fill="url(#bg3)" />
  
  <!-- Large geometric shapes - architectural feel -->
  <rect x="-100" y="200" width="400" height="400" fill="#1e5a96" opacity="0.05" 
        transform="rotate(-15 100 400)" />
  <rect x="500" y="100" width="350" height="350" fill="#5cb85c" opacity="0.06" 
        transform="rotate(20 675 275)" />
  
  <!-- Clean accent line -->
  <rect x="0" y="350" width="800" height="3" fill="#4a90e2" opacity="0.15" />
  
  <!-- Circular elements suggesting care/protection -->
  <circle cx="650" cy="600" r="120" fill="none" stroke="#1e5a96" stroke-width="2" opacity="0.08" />
  <circle cx="650" cy="600" r="90" fill="none" stroke="#1e5a96" stroke-width="2" opacity="0.06" />
  <circle cx="650" cy="600" r="60" fill="none" stroke="#5cb85c" stroke-width="2" opacity="0.1" />
  
  <!-- Small accent dots -->
  <circle cx="120" cy="120" r="12" fill="#1e5a96" opacity="0.2" />
  <circle cx="180" cy="680" r="16" fill="#5cb85c" opacity="0.18" />
  <circle cx="720" cy="180" r="10" fill="#4a90e2" opacity="0.15" />
  
  <!-- Subtle grid pattern -->
  <g opacity="0.02" stroke="#1e5a96" stroke-width="1" fill="none">
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="600" x2="800" y2="600" />
    <line x1="200" y1="0" x2="200" y2="800" />
    <line x1="400" y1="0" x2="400" y2="800" />
    <line x1="600" y1="0" x2="600" y2="800" />
  </g>
</svg>