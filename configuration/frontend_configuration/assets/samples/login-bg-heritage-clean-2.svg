<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid base - teal blue -->
  <rect width="800" height="800" fill="#2c7a9e" />
  
  <!-- Left edge blend -->
  <rect width="60" height="800" fill="#f5f5f5" opacity="1" />
  <rect x="60" width="40" height="800" fill="#2c7a9e" opacity="0.3" />
  <rect x="100" width="30" height="800" fill="#2c7a9e" opacity="0.7" />
  
  <!-- Large geometric shapes - Ethiopian colors -->
  <circle cx="650" cy="200" r="100" fill="#5cb85c" opacity="0.25" />
  <rect x="500" y="450" width="140" height="140" fill="#ffd700" opacity="0.2" transform="rotate(15 570 520)" />
  <polygon points="300,650 380,730 420,690 340,610" fill="#e53935" opacity="0.22" />
  
  <!-- Medical cross - prominent but clean -->
  <g opacity="0.3">
    <rect x="640" y="500" width="40" height="160" fill="#ffffff" rx="6" />
    <rect x="580" y="560" width="160" height="40" fill="#ffffff" rx="6" />
  </g>
  
  <!-- Dot grid pattern - subtle texture -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="200" cy="200" r="3" /> <circle cx="270" cy="200" r="3" /> <circle cx="340" cy="200" r="3" /> <circle cx="410" cy="200" r="3" /> <circle cx="480" cy="200" r="3" /> <circle cx="550" cy="200" r="3" /> <circle cx="620" cy="200" r="3" /> <circle cx="690" cy="200" r="3" />
    <circle cx="200" cy="270" r="3" /> <circle cx="270" cy="270" r="3" /> <circle cx="340" cy="270" r="3" /> <circle cx="410" cy="270" r="3" /> <circle cx="480" cy="270" r="3" /> <circle cx="550" cy="270" r="3" /> <circle cx="620" cy="270" r="3" /> <circle cx="690" cy="270" r="3" />
    <circle cx="200" cy="340" r="3" /> <circle cx="270" cy="340" r="3" /> <circle cx="340" cy="340" r="3" /> <circle cx="410" cy="340" r="3" /> <circle cx="480" cy="340" r="3" /> <circle cx="550" cy="340" r="3" /> <circle cx="620" cy="340" r="3" /> <circle cx="690" cy="340" r="3" />
    <circle cx="200" cy="410" r="3" /> <circle cx="270" cy="410" r="3" /> <circle cx="340" cy="410" r="3" /> <circle cx="410" cy="410" r="3" /> <circle cx="480" cy="410" r="3" /> <circle cx="550" cy="410" r="3" /> <circle cx="620" cy="410" r="3" /> <circle cx="690" cy="410" r="3" />
    <circle cx="200" cy="480" r="3" /> <circle cx="270" cy="480" r="3" /> <circle cx="340" cy="480" r="3" /> <circle cx="410" cy="480" r="3" /> <circle cx="480" cy="480" r="3" /> <circle cx="550" cy="480" r="3" /> <circle cx="620" cy="480" r="3" /> <circle cx="690" cy="480" r="3" />
    <circle cx="200" cy="550" r="3" /> <circle cx="270" cy="550" r="3" /> <circle cx="340" cy="550" r="3" /> <circle cx="410" cy="550" r="3" /> <circle cx="480" cy="550" r="3" /> <circle cx="550" cy="550" r="3" /> <circle cx="620" cy="550" r="3" /> <circle cx="690" cy="550" r="3" />
    <circle cx="200" cy="620" r="3" /> <circle cx="270" cy="620" r="3" /> <circle cx="340" cy="620" r="3" /> <circle cx="410" cy="620" r="3" /> <circle cx="480" cy="620" r="3" /> <circle cx="550" cy="620" r="3" /> <circle cx="620" cy="620" r="3" /> <circle cx="690" cy="620" r="3" />
    <circle cx="200" cy="690" r="3" /> <circle cx="270" cy="690" r="3" /> <circle cx="340" cy="690" r="3" /> <circle cx="410" cy="690" r="3" /> <circle cx="480" cy="690" r="3" /> <circle cx="550" cy="690" r="3" /> <circle cx="620" cy="690" r="3" /> <circle cx="690" cy="690" r="3" />
  </g>
  
  <!-- Heartbeat line - angular/geometric style -->
  <path d="M 150 350 L 230 350 L 260 310 L 290 390 L 320 350 L 450 350" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="square" />
  
  <!-- Flag stripe accent - vertical on right edge -->
  <rect x="740" y="300" width="20" height="100" fill="#5cb85c" opacity="0.6" />
  <rect x="760" y="300" width="20" height="100" fill="#ffd700" opacity="0.6" />
  <rect x="780" y="300" width="20" height="100" fill="#e53935" opacity="0.6" />
  
  <!-- Corner accent squares -->
  <rect x="160" y="60" width="50" height="50" fill="#ffffff" opacity="0.12" rx="6" />
  <rect x="690" y="690" width="60" height="60" fill="#ffffff" opacity="0.1" rx="6" />
</svg>
