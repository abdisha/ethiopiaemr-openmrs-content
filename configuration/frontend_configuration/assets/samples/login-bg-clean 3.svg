<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        {/* Soft blue-gray base */}
        <rect width="800" height="800" fill="#dfe6ed" />
        
        {/* Left edge blend */}
        <rect width="120" height="800" fill="#f5f5f5" />
        <rect x="120" width="40" height="800" fill="#dfe6ed" opacity="0.5" />
        
        {/* Large geometric shapes */}
        <rect x="-80" y="250" width="400" height="400" fill="#1e5a96" opacity="0.045" 
              transform="rotate(-10 120 450)" />
        <rect x="520" y="120" width="340" height="340" fill="#5cb85c" opacity="0.05" 
              transform="rotate(15 690 290)" />
        
        {/* Ethiopian flag elements - corner accent */}
        <g opacity="0.25">
          <circle cx="120" cy="120" r="35" fill="#5cb85c" />
          <circle cx="680" cy="120" r="30" fill="#e53935" />
          <circle cx="120" cy="680" r="38" fill="#ffd700" />
          <circle cx="680" cy="680" r="32" fill="#5cb85c" />
        </g>
        
        {/* Medical cross - subtle */}
        <g opacity="0.06">
          <rect x="630" y="550" width="30" height="120" fill="#1e5a96" rx="4" />
          <rect x="585" y="595" width="120" height="30" fill="#1e5a96" rx="4" />
        </g>
        
        {/* Heartbeat/EKG line */}
        <polyline 
          points="200,480 280,480 310,440 340,520 370,480 500,480 530,460 560,500 590,480 720,480"
          stroke="#1e5a96"
          strokeWidth="2.5"
          fill="none"
          opacity="0.15"
          strokeLinecap="round"
          strokeLinejoin="round"
        />
        
        {/* Network connectivity nodes */}
        <circle cx="300" cy="350" r="6" fill="#5cb85c" opacity="0.4" />
        <circle cx="500" cy="320" r="7" fill="#ffd700" opacity="0.4" />
        <circle cx="620" cy="380" r="5" fill="#e53935" opacity="0.35" />
        
        <line x1="300" y1="350" x2="500" y2="320" stroke="#1e5a96" strokeWidth="1" opacity="0.1" />
        <line x1="500" y1="320" x2="620" y2="380" stroke="#1e5a96" strokeWidth="1" opacity="0.1" />
        
        {/* Decorative squares */}
        <rect x="720" y="240" width="50" height="50" fill="#ffffff" opacity="0.3" rx="6" />
        <rect x="190" y="70" width="40" height="40" fill="#ffffff" opacity="0.25" rx="4" />
      </svg>