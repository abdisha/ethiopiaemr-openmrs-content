<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <!-- Light gray base -->
        <rect width="800" height="800" fill="#e9ecef" />
        
        <!-- Left edge - seamless blend with whitesmoke -->
        <rect width="100" height="800" fill="#f5f5f5" />
        
        <!-- Large rotated rectangle - subtle blue -->
        <rect x="-50" y="200" width="350" height="350" fill="#1e5a96" opacity="0.04" 
              transform="rotate(-12 125 375)" />
        
        <!-- Large rotated rectangle - subtle green -->
        <rect x="500" y="150" width="320" height="320" fill="#5cb85c" opacity="0.05" 
              transform="rotate(18 660 310)" />
        
        <!-- Ethiopian flag accent - vertical bars on right edge -->
        <rect x="730" y="250" width="25" height="120" fill="#5cb85c" opacity="0.3" />
        <rect x="755" y="250" width="25" height="120" fill="#ffd700" opacity="0.25" />
        <rect x="780" y="250" width="20" height="120" fill="#e53935" opacity="0.22" />
        
        <!-- Horizontal accent line -->
        <rect x="0" y="350" width="800" height="2" fill="#1e5a96" opacity="0.12" />
        
        <!-- Circular care elements -->
        <circle cx="650" cy="600" r="110" fill="none" stroke="#1e5a96" stroke-width="2" opacity="0.06" />
        <circle cx="650" cy="600" r="80" fill="none" stroke="#1e5a96" stroke-width="1.5" opacity="0.05" />
        <circle cx="650" cy="600" r="50" fill="none" stroke="#5cb85c" stroke-width="1.5" opacity="0.08" />
        
        <!-- Small accent dots -->
        <circle cx="140" cy="140" r="10" fill="#1e5a96" opacity="0.15" />
        <circle cx="200" cy="680" r="14" fill="#5cb85c" opacity="0.13" />
        <circle cx="710" cy="170" r="8" fill="#4a90e2" opacity="0.12" />
        
        <!-- Subtle grid pattern -->
        <g opacity="0.015" stroke="#1e5a96" stroke-width="1" fill="none">
          <line x1="0" y1="200" x2="800" y2="200" />
          <line x1="0" y1="400" x2="800" y2="400" />
          <line x1="0" y1="600" x2="800" y2="600" />
          <line x1="200" y1="0" x2="200" y2="800" />
          <line x1="400" y1="0" x2="400" y2="800" />
          <line x1="600" y1="0" x2="600" y2="800" />
        </g>
      </svg>